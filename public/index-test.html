        // --- NEW: AI IMAGE GENERATION ---
        async function generateCharacterImage(persona) {
            return new Promise(async (resolve, reject) => {
                const prompt = `A cute and simple 2D character that represents the following persona: "${persona}". Minimalist vector art style, clean lines, on a transparent background.`;
                
                // IMPORTANT: Replace with your actual Cloud Function URL for image generation
                const functionUrl = 'https://us-central1-monitor-3jp.cloudfunctions.net/generateCharacter'; 

                try {
                    const response = await fetch(functionUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ prompt: prompt })
                    });

                    if (!response.ok) {
                        const errorBody = await response.text();
                        console.error("Cloud Function Error:", response.status, response.statusText, errorBody);
                        throw new Error(`Request failed: ${response.statusText}`);
                    }
                    
                    const result = await response.json();
                    if (!result.imageData) {
                        throw new Error("No image data received from server.");
                    }

                    const characterImg = new Image();
                    characterImg.onload = () => resolve(characterImg);
                    characterImg.onerror = reject;
                    characterImg.src = `data:image/png;base64,${result.imageData}`;

                } catch (error) {
                    console.error("Failed to generate character image:", error);
                    reject(error);
                }
            });
        }


        // --- NEW/UPDATED: SHARE IMAGE DRAWING ---
        function drawBackground(ctx, width, height) {
            const gradient = ctx.createLinearGradient(0, 0, width, height);
            gradient.addColorStop(0, '#1F2937'); // bg-gray-800
            gradient.addColorStop(1, '#111827'); // bg-gray-900
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            
            // Subtle pattern for texture
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 1;
            for (let i = 0; i < 30; i++) {
                ctx.beginPath();
                ctx.moveTo(Math.random() * width, 0);
                ctx.lineTo(Math.random() * width, height);
                ctx.moveTo(0, Math.random() * height);
                ctx.lineTo(width, Math.random() * height);
                ctx.stroke();
            }
        }
        
        async function drawPersonaText(ctx, text, maxWidth, startY) {
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = 'white';
            
            let fontSize = 120; // Start with a large font size
            let lines = [];

            // Loop to find the best font size that fits in 2 lines
            while (fontSize > 40) {
                ctx.font = `900 ${fontSize}px Inter`;
                const words = text.replace(/"/g, '').split(' ');
                let currentLine = words[0];
                lines = [currentLine];

                for (let i = 1; i < words.length; i++) {
                    let testLine = lines[lines.length - 1] + ' ' + words[i];
                    if (ctx.measureText(testLine).width > maxWidth) {
                        lines.push(words[i]);
                    } else {
                        lines[lines.length - 1] = testLine;
                    }
                }
                
                if (lines.length <= 2) {
                    break; // Found a good size
                }
                fontSize -= 5; // Decrease font size and try again
            }

            // Draw the lines
            const lineHeight = fontSize * 1.2;
            const totalHeight = lines.length * lineHeight;
            let currentY = startY - totalHeight / 2 + lineHeight / 2;

            for (const line of lines) {
                ctx.fillText(line, 1080 / 2, currentY);
                currentY += lineHeight;
            }
        }

        async function drawShareCharacter(ctx, width, height, persona, characterImg) {
            // 1. Draw Background
            drawBackground(ctx, width, height);
            
            // 2. Draw Site Title
            ctx.fillStyle = '#9CA3AF'; // text-gray-400
            ctx.font = 'bold 50px Inter';
            ctx.textAlign = 'center';
            ctx.fillText('시간기록부', width / 2, height * 0.1);

            // 3. Draw Persona Text
            await drawPersonaText(ctx, persona, width * 0.85, height * 0.3);

            // 4. Draw AI Character Image
            const aspectRatio = characterImg.width / characterImg.height;
            const charHeight = height * 0.45;
            const charWidth = charHeight * aspectRatio;
            const charX = (width - charWidth) / 2;
            const charY = height * 0.5;
            ctx.drawImage(characterImg, charX, charY, charWidth, charHeight);
            
            // 5. Draw Footer
            ctx.fillStyle = '#4B5563'; // text-gray-600
            ctx.font = '30px Inter';
            ctx.fillText('Generated by siganlog.com', width / 2, height * 0.95);
        }
