<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">

    <title>라운지 | 시간기록부 AI 페르소나 갤러리</title>

        crossorigin="anonymous"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #2d3748;
        }

        ::-webkit-scrollbar-thumb {
            background: #4a5568;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #718096;
        }

        .glass {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-glass {
            background: rgba(31, 41, 55, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .card-glass:hover {
            transform: translateY(-5px);
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>

<body class="bg-gray-900 text-gray-200 min-h-screen">

    <!-- Navigation Bar -->
    <nav class="fixed top-0 w-full z-50 glass">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="/" class="text-xl font-bold text-white flex items-center space-x-2">
                <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center overflow-hidden">
                    <img src="/icon.png" alt="Icon" class="w-full h-full object-cover">
                </div>
                <span>시간기록부</span>
            </a>
            <div class="flex space-x-6 items-center">
                <a href="/" class="text-gray-400 hover:text-white transition-colors">홈으로</a>
                <a href="/guide.html" class="text-gray-400 hover:text-white transition-colors">이용 가이드</a>
            </div>
        </div>
    </nav>

    <div class="flex justify-center min-h-screen pt-20">
        <!-- Left Ad Space -->
        <aside class="hidden lg:block w-48 xl:w-64 flex-shrink-0 p-4 pt-12">
            <div class="sticky top-24">
                <div class="bg-gray-800/50 rounded-lg border border-gray-700 p-2 text-center">
                    <p class="text-[10px] text-gray-500 mb-2 uppercase tracking-widest">Advertisement</p>
                    <div
                        class="flex justify-center items-center min-h-[600px] bg-gray-900/30 rounded border border-dashed border-gray-700">
                        <!-- Google AdSense - Left Skyscraper -->
                        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-5322425731380321"
                            data-ad-slot="5432965084" data-ad-format="auto" data-full-width-responsive="true"></ins>
                        <script>
                            (adsbygoogle = window.adsbygoogle || []).push({});
                        </script>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="w-full max-w-7xl">
            <main class="container mx-auto px-4 pt-12 pb-20">
                <header class="text-center mb-16">
                    <h1 class="text-4xl lg:text-5xl font-extrabold text-white mb-4">
                        AI 페르소나 <span
                            class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400">라운지</span>
                    </h1>
                    <p class="text-gray-400 text-lg">다양한 사람들의 디지털 자아를 만나보세요.</p>
                </header>

                <!-- Gallery Grid -->
                <div id="loungeGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                    <!-- Loader -->
                    <div id="loader" class="col-span-full flex flex-col items-center justify-center py-20">
                        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-indigo-500 mb-4">
                        </div>
                        <p class="text-indigo-300">페르소나들을 불러오는 중...</p>
                    </div>
                </div>

                <!-- Empty State -->
                <div id="emptyState" class="hidden text-center py-20">
                    <div class="text-6xl mb-4">🏜️</div>
                    <h2 class="text-2xl font-bold text-white mb-2">아직 공유된 페르소나가 없습니다.</h2>
                    <p class="text-gray-400 mb-8">첫 번째로 당신의 페르소나를 공유해보세요!</p>
                    <a href="/"
                        class="px-8 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-full transition-all">분석하러
                        가기</a>
                </div>
            </main>
        </div>

        <!-- Right Ad Space -->
        <aside class="hidden lg:block w-48 xl:w-64 flex-shrink-0 p-4 pt-12">
            <div class="sticky top-24">
                <div class="bg-gray-800/50 rounded-lg border border-gray-700 p-2 text-center">
                    <p class="text-[10px] text-gray-500 mb-2 uppercase tracking-widest">Advertisement</p>
                    <div
                        class="flex justify-center items-center min-h-[600px] bg-gray-900/30 rounded border border-dashed border-gray-700">
                        <!-- Google AdSense - Right Skyscraper -->
                        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-5322425731380321"
                            data-ad-slot="1138319248" data-ad-format="auto" data-full-width-responsive="true"></ins>
                        <script>
                            (adsbygoogle = window.adsbygoogle || []).push({});
                        </script>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <footer class="py-10 border-t border-gray-800 text-center">
        <p class="text-gray-500 text-sm">© 2026 시간기록부 (시기부). All rights reserved.</p>
    </footer>

    <script>
        const loungeGrid = document.getElementById('loungeGrid');
        const loader = document.getElementById('loader');
        const emptyState = document.getElementById('emptyState');

        // Get or generate User ID for Likes
        function getOrGenerateUserId() {
            let userId = localStorage.getItem('lounge_user_id');
            if (!userId) {
                userId = 'u_' + Math.random().toString(36).substring(2, 15) + Date.now().toString(36);
                localStorage.setItem('lounge_user_id', userId);
            }
            return userId;
        }

        const currentUserId = getOrGenerateUserId();

        async function fetchPosts() {
            try {
                const response = await fetch('https://asia-northeast3-monitor-3jp.cloudfunctions.net/getLoungePosts');
                const data = await response.json();

                loader.classList.add('hidden');

                if (data.posts && data.posts.length > 0) {
                    renderPosts(data.posts);
                } else {
                    emptyState.classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error fetching lounge posts:', error);
                loader.innerHTML = '<p class="text-red-400">데이터를 불러오지 못했습니다. 잠시 후 다시 시도해주세요.</p>';
            }
        }

        function renderPosts(posts) {
            loungeGrid.innerHTML = '';
            posts.forEach(post => {
                const card = createPostCard(post);
                loungeGrid.appendChild(card);
            });
        }

        function createPostCard(post) {
            const div = document.createElement('div');
            div.className = 'card-glass rounded-2xl overflow-hidden flex flex-col h-full';

            const genderText = post.gender === 'M' ? '남성' : '여성';
            const ageText = `${post.age}대`;

            div.innerHTML = `
                <div class="relative aspect-square bg-gray-800">
                    <img src="${post.imageUrl}" alt="${post.persona}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-black bg-opacity-0 hover:bg-opacity-20 transition-all"></div>
                </div>
                <div class="p-6 flex flex-col flex-grow">
                    <div class="flex-grow">
                        <p class="text-white font-bold text-lg leading-snug mb-4">"${post.persona}"</p>
                    </div>
                    <div class="flex items-center justify-between mt-4">
                        <div class="flex flex-col">
                            <span class="text-[10px] text-gray-500 uppercase tracking-widest font-bold">Demographics</span>
                            <span class="text-xs text-indigo-300 font-medium">${ageText} ${genderText}</span>
                        </div>
                        <button onclick="handleLike('${post.id}', this)" 
                                data-id="${post.id}"
                                class="flex items-center space-x-2 px-3 py-1.5 rounded-full border border-gray-700 hover:border-pink-500/50 hover:bg-pink-500/10 transition-all group">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-500 group-hover:text-pink-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                            </svg>
                            <span class="text-sm font-semibold text-gray-400 group-hover:text-pink-200">${post.likes || 0}</span>
                        </button>
                    </div>
                </div>
            `;
            return div;
        }

        async function handleLike(postId, button) {
            const icon = button.querySelector('svg');
            const countSpan = button.querySelector('span');
            let currentLikes = parseInt(countSpan.textContent);

            // Simple UI optimistic update
            const isLiked = icon.getAttribute('fill') === 'currentColor';
            const action = isLiked ? 'unlike' : 'like';

            if (button.disabled) return;
            button.disabled = true;

            try {
                const response = await fetch('https://asia-northeast3-monitor-3jp.cloudfunctions.net/toggleLike', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ postId, userId: currentUserId, action })
                });

                if (response.ok) {
                    if (action === 'like') {
                        icon.setAttribute('fill', 'currentColor');
                        icon.classList.add('text-pink-500');
                        icon.classList.remove('text-gray-500');
                        countSpan.textContent = currentLikes + 1;
                        countSpan.classList.add('text-pink-200');
                    } else {
                        icon.setAttribute('fill', 'none');
                        icon.classList.remove('text-pink-500');
                        icon.classList.add('text-gray-500');
                        countSpan.textContent = Math.max(0, currentLikes - 1);
                        countSpan.classList.remove('text-pink-200');
                    }
                } else {
                    const error = await response.json();
                    if (error.error === 'Already liked' && action === 'like') {
                        icon.setAttribute('fill', 'currentColor');
                        icon.classList.add('text-pink-500');
                    } else if (error.error === 'Not liked yet' && action === 'unlike') {
                        icon.setAttribute('fill', 'none');
                        icon.classList.add('text-gray-500');
                    } else {
                        alert('좋아요 처리 중 오류가 발생했습니다.');
                    }
                }
            } catch (error) {
                console.error('Error toggling like:', error);
                alert('네트워크 오류가 발생했습니다.');
            } finally {
                button.disabled = false;
            }
        }

        window.addEventListener('DOMContentLoaded', fetchPosts);
    </script>
</body>

</html>
